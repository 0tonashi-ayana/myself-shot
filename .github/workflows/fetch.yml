name: Fetch Fitbit Sleep

on:
  schedule:
    # every 15 minutes during 21:00-23:59 UTC (≈ 08:00-10:59 AEDT)
    - cron: "*/15 21-23 * * *"
    # every 15 minutes during 00:00-01:59 UTC (≈ 11:00-12:59 AEDT)
    - cron: "*/15 0-1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    env:
      FITBIT_CLIENT_ID: ${{ secrets.FITBIT_CLIENT_ID }}
      FITBIT_CLIENT_SECRET: ${{ secrets.FITBIT_CLIENT_SECRET }}
      FITBIT_REFRESH_TOKEN: ${{ secrets.FITBIT_REFRESH_TOKEN }}
      GH_SECRET_TOKEN: ${{ secrets.GH_SECRET_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests pynacl

      - name: Fetch sleep and update docs
        env:
          FITBIT_CLIENT_ID: ${{ secrets.FITBIT_CLIENT_ID }}
          FITBIT_CLIENT_SECRET: ${{ secrets.FITBIT_CLIENT_SECRET }}
          FITBIT_REFRESH_TOKEN: ${{ secrets.FITBIT_REFRESH_TOKEN }}
        run: python scripts/fetch_sleep.py
        
      - name: Push raw to private repo
        env:
          RAW_REPO_TOKEN: ${{ secrets.RAW_REPO_TOKEN }}
        run: |
          set -e
          rm -rf raw_repo
          git clone https://x-access-token:${RAW_REPO_TOKEN}@github.com/0tonashi-ayana/fitbit-raw.git raw_repo
          mkdir -p raw_repo/sleep_raw
          cp -r out_raw/*.sleep.json raw_repo/sleep_raw/ || true
          cd raw_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sleep_raw/*.sleep.json || true
          git diff --cached --quiet || git commit -m "Add sleep raw"
          git push
          
      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/latest.json docs/index.html || true
          git diff --cached --quiet || git commit -m "Update sleep summary"
          git push

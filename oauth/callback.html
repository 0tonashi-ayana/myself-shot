<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fitbit OAuth Callback</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; line-height: 1.5; }
    code, pre { background: #f4f4f4; padding: 2px 6px; border-radius: 6px; }
    .box { background: #f8f8f8; border: 1px solid #e6e6e6; border-radius: 12px; padding: 16px; }
    button { padding: 10px 14px; border-radius: 10px; border: 1px solid #ccc; background: white; cursor: pointer; }
    button:active { transform: translateY(1px); }
    .muted { color: #666; font-size: 14px; }
    .ok { color: #0a7; font-weight: 600; }
    .bad { color: #c22; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Fitbit OAuth Callback</h1>

  <div class="box">
    <p><b>code</b>:</p>
    <pre id="code">Loading...</pre>

    <button id="copyBtn">Copy code</button>
    <span id="copyStatus" class="muted"></span>

    <hr style="margin:16px 0;border:none;border-top:1px solid #e6e6e6" />

    <p class="muted">
      If you see an <code>error</code> instead of a code, copy the error text too.
    </p>
    <p><b>error</b>:</p>
    <pre id="err">-</pre>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const error = params.get("error") || params.get("error_description");

    const codeEl = document.getElementById("code");
    const errEl  = document.getElementById("err");
    const btn    = document.getElementById("copyBtn");
    const status = document.getElementById("copyStatus");

    if (code) {
      codeEl.textContent = code;
      errEl.textContent = "-";
      btn.disabled = false;
    } else {
      codeEl.textContent = "(no code in URL)";
      errEl.textContent = error ? error : "(no error in URL)";
      btn.disabled = true;
    }

    btn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(code);
        status.textContent = "Copied ✓";
        status.className = "ok";
      } catch (e) {
        status.textContent = "Copy failed — select and copy manually.";
        status.className = "bad";
      }
      setTimeout(() => { status.textContent = ""; status.className = "muted"; }, 3000);
    });
  </script>
</body>
</html>
